
<div class="mb-3">
  <label for="search" class="form-label">Rechercher</label>
  <input type="email" class="form-control" id="search" placeholder="Votre recherche..." (input)="recherche($event)">
</div>

<h3>Adherents : {{ adherentsFiltres.length }} résultat(s)"</h3>

@for (adherent of adherentsFiltres; track adherent.id) {
    <app-adherent-card [adherent]="adherent" (voirDetails)="gererVoirDetail($event)">
    </app-adherent-card>
} @empty {
    <div>Aucun adhérent trouvé</div>
}
