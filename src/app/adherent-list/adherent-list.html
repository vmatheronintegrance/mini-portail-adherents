
<!-- UN SELECT POUR SELECTIONNER L'ADHERENT DANS UNE LISTE -->
<select class="form-select mb-3" aria-label="Select adhérent" (change)="onAdherentSelect($event)">
  <option selected>Sélectionner adhérent</option>

  @for (item of adherents; track $index) {
    <option [value]="item.id">{{ item.prenom }} {{ item.nom }}</option>
  }
</select>

<!-- LE COMPOSANT CARD QUI SE MET A JOUR EN FONCITON DE LA SELECTION -->
<app-adherent-card [adherent]="selectedAdherent"></app-adherent-card>
