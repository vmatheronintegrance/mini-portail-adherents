<form (submit)="submit($event)">
    <div class="mb-3">
        <label for="champEmail" class="form-label">Email...</label>
        <input type="email" class="form-control" id="champEmail" placeholder="name@example.com" [formControl]="email">
        @if (email.invalid && (email.dirty || email.touched)) {
            <div class="text-danger">Ce champ est invalide</div>
        }
    </div>   

    
    <button type="submit" class="btn btn-outline-primary ms-2" [disabled]="email.invalid">
        Valider
    </button>
</form>
