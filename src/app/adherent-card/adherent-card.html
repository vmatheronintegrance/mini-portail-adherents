@if (adherent(); as adherent) {

    <div class="card mb-3">
        <div class="card-header">
            {{ adherent.prenom | titlecase}} {{ adherent.nom | uppercase }}
        </div>
        <div class="card-body">
            <div>Date d'adhésion : {{ adherent.dateAdhesion | date:'dd MMMM yy' }}</div>
            <div>Email : {{ adherent.email }}</div>
            <div>Statut : {{ adherent.statut | statut}}</div>

            <div class="mt-3">
                <button type="button"
                        class="btn btn-outline-primary"
                        (click)="voirDetails.emit(adherent)">

                    Voir Détails
                </button>
            
                <button type="button" class="btn btn-outline-danger ms-2" (click)="suppressionAdherent.emit(adherent.id)">Supprimer</button>
            </div>
        </div>
    </div>
}
